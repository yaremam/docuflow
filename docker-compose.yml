version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: doc_manager_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d doc_manager_db"]
      interval: 2s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Веб-інтерфейс Jaeger
      - "4317:4317"   # OpenTelemetry gRPC порт
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 2s
      timeout: 3s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI — view sent reset emails at http://localhost:8025
      - "1025:1025" # SMTP

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: postgres://admin:secretpassword@postgres:5432/doc_manager_db
      OTLP_ENDPOINT: http://jaeger:4317
      PORT: 8081
      # Embedded in emailed password-reset links, which are followed by the
      # user's own browser — must be the host-mapped address, not an
      # internal Docker Compose hostname.
      APP_BASE_URL: http://localhost:8081
      AWS_ENDPOINT_URL: http://localstack:4566
      # Presigned URLs are embedded in rendered pages and followed by the
      # user's own browser, which can't resolve the internal `localstack`
      # service hostname above — only the host-mapped port works there.
      BLOB_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      BLOB_BUCKET_NAME: docuflow-uploads
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@docuflow.local
      SMTP_INSECURE: "true"
    ports:
      - "8081:8081"

volumes:
  pgdata:
