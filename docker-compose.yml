version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: doc_manager_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d doc_manager_db"]
      interval: 2s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Веб-інтерфейс Jaeger
      - "4317:4317"   # OpenTelemetry gRPC порт
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # S3-compatible blob storage for local dev (real S3 in prod — see
  # `src/blob.rs`, driven purely by standard AWS env vars below). Was
  # LocalStack until 2026-07-13: LocalStack Community's `PERSISTENCE=1`
  # flag does not actually persist S3 object data across container
  # restarts (verified empirically — its data volume stayed empty after
  # hours of real traffic; full state persistence is a LocalStack Pro
  # feature). MinIO's persistence is a real, free, self-hosted volume
  # write — no equivalent gap.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console — browse buckets at http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI — view sent reset emails at http://localhost:8025
      - "1025:1025" # SMTP

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: postgres://admin:secretpassword@postgres:5432/doc_manager_db
      OTLP_ENDPOINT: http://jaeger:4317
      PORT: 8081
      # Embedded in emailed password-reset links, which are followed by the
      # user's own browser — must be the host-mapped address, not an
      # internal Docker Compose hostname.
      APP_BASE_URL: http://localhost:8081
      AWS_ENDPOINT_URL: http://minio:9000
      # Presigned URLs are embedded in rendered pages and followed by the
      # user's own browser, which can't resolve the internal `minio`
      # service hostname above — only the host-mapped port works there.
      BLOB_PUBLIC_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      BLOB_BUCKET_NAME: docuflow-uploads
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@docuflow.local
      SMTP_INSECURE: "true"
    ports:
      - "8081:8081"

volumes:
  pgdata:
  minio_data:
