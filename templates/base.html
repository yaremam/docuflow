<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DocuFlow{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="page-nav">
    <a class="brand" href="/">DocuFlow</a>
    <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Switch to dark theme" title="Switch to dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 3v2M12 19v2M4.6 4.6l1.4 1.4M18 18l1.4 1.4M3 12h2M19 12h2M4.6 19.4l1.4-1.4M18 6l1.4-1.4"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z"></path></svg>
    </button>
    {% if authenticated %}
    <a class="tab{% if active_tab == "documents" %} is-primary{% endif %}" href="/documents">Documents</a>
    <a class="avatar-link{% if active_tab == "profile" %} is-current{% endif %}" href="/profile" aria-label="Profile" title="Profile">
      <span class="avatar-circle">
        {% if let Some(url) = nav_avatar_url %}
        <img src="{{ url }}" alt="">
        {% else %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.4"></circle><path d="M4.5 19.4c1.4-3.4 4.2-5.1 7.5-5.1s6.1 1.7 7.5 5.1"></path></svg>
        {% endif %}
      </span>
    </a>
    <form method="post" action="/logout" class="nav-logout-form">
      <button class="tab tab-button" type="submit">Log out</button>
    </form>
    {% else %}
    <a class="tab{% if active_tab == "login" %} is-primary{% endif %}" href="/login">Log in</a>
    <a class="tab{% if active_tab == "signup" %} is-primary{% endif %}" href="/signup">Sign up</a>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>&copy; DocuFlow</span>
    <span>Status: healthy</span>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function currentTheme() {
        var attr = document.documentElement.getAttribute('data-theme');
        if (attr === 'light' || attr === 'dark') return attr;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function otherTheme(theme) {
        return theme === 'dark' ? 'light' : 'dark';
      }

      function updateLabel(next) {
        var label = 'Switch to ' + next + ' theme';
        btn.setAttribute('aria-label', label);
        btn.setAttribute('title', label);
      }

      updateLabel(otherTheme(currentTheme()));

      btn.addEventListener('click', function () {
        var next = otherTheme(currentTheme());
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateLabel(otherTheme(next));
      });
    })();
  </script>
</body>
</html>
