{% extends "base.html" %}

{% block title %}Log in — DocuFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="card" data-tab="Login">
    <h2>Welcome back</h2>
    <p class="card-sub">Log in to your workspace.</p>
    <form method="post" action="/login">
{% include "_credentials_fields.html" %}
      <button class="btn btn-stamp" type="submit">Log in</button>
    </form>
    <p class="swap">New here? <a href="/signup">Create a workspace</a></p>
  </div>
</div>
{% endblock %}
