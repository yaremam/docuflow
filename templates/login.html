{% extends "base.html" %}

{% block title %}Log in — DocuFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="card" data-tab="Login">
    <h2>Welcome back</h2>
    <p class="card-sub">Log in to your account.</p>
    {% if let Some(error) = error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
{% include "_credentials_fields.html" %}
      <button class="btn btn-stamp" type="submit">Log in</button>
    </form>
    <p class="swap"><a href="/forgot-password">Forgot your password?</a></p>
    <p class="swap">New here? <a href="/signup">Sign up</a></p>
  </div>
</div>
{% endblock %}
