{% extends "base.html" %}

{% block title %}Reset password — DocuFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="card" data-tab="Reset">
    <h2>Set a new password</h2>
    {% if valid %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="field">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" minlength="8" required>
        <p class="field-hint">At least 8 characters.</p>
      </div>
      <button class="btn btn-stamp" type="submit">Reset password</button>
    </form>
    {% else %}
    <p class="card-sub">This reset link is invalid or has expired.</p>
    <p class="swap"><a href="/forgot-password">Request a new link</a></p>
    {% endif %}
  </div>
</div>
{% endblock %}
