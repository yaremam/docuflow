[env]
# Local dev-stack credentials (Postgres/MinIO/Mailpit via `docker
# compose up -d`), mirroring `.env` — set here too so a bare `cargo test`/
# `cargo run`/`cargo check`/`cargo clippy`/`cargo sqlx` picks them up
# without needing `source .env` (or an inline env-var prefix) before every
# single invocation. Not secrets: these are fixed, well-known local-only
# dev credentials, not real production values.
DATABASE_URL = "postgres://admin:secretpassword@localhost:5432/doc_manager_db"
AWS_ENDPOINT_URL = "http://localhost:9000"
AWS_ACCESS_KEY_ID = "minioadmin"
AWS_SECRET_ACCESS_KEY = "minioadmin"
AWS_REGION = "us-east-1"
BLOB_BUCKET_NAME = "docuflow-uploads"
SMTP_HOST = "localhost"
SMTP_PORT = "1025"
SMTP_FROM = "no-reply@docuflow.local"
SMTP_INSECURE = "true"

# The integration test suite shares mutable state across tests: every
# `test_state()` call (tests/common/mod.rs) truncates `users`/`tenants` at
# the start of a test, against one shared `doc_manager_db_test` database.
# That makes tests unsafe to run concurrently within a binary — one test's
# truncate can wipe another concurrently-running test's just-created
# fixtures mid-test, or two truncates can deadlock on Postgres's
# AccessExclusiveLock. Forcing single-threaded test execution here means
# `cargo test` is deterministic with no flag to remember, rather than
# depending on every contributor knowing to pass `--test-threads=1`.
RUST_TEST_THREADS = "1"
